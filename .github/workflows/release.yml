name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (framework-dependent, small)
        run: >
          dotnet publish EQMightPatcher.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish-small

      - name: Publish (self-contained, no install needed)
        run: >
          dotnet publish EQMightPatcher.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -o publish-full

      - name: Zip releases
        run: |
          Get-ChildItem publish-small -Exclude *.pdb | Compress-Archive -DestinationPath EQMightPatcher-${{ github.ref_name }}-small.zip
          Get-ChildItem publish-full  -Exclude *.pdb | Compress-Archive -DestinationPath EQMightPatcher-${{ github.ref_name }}-full.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EQMightPatcher-${{ github.ref_name }}-no_framework.zip
            EQMightPatcher-${{ github.ref_name }}.zip
          name: EQ Might Patcher ${{ github.ref_name }}
          generate_release_notes: true
